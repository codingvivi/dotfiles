# System definitions consumed by chezmoi scripts.
#
# Each entry under [systems.<name>] declares:
#   ids                — values matched against the detected system identifier:
#                        on Linux this is the `ID` from /etc/os-release;
#                        on systems without /etc/os-release (e.g. macOS), it
#                        is `uname -s` lowercased (e.g. "darwin").
#   install            — package manager invocation as a list; packages get appended
#   exclude_by_default — if true, skip every entry in packages.yaml on this system
#                        unless the entry has `<name>: { install: include }` (or
#                        `install: exclusive`). Optional, defaults to false.
#   ignore             — list of source-path patterns chezmoi should not deploy on
#                        this system. Consumed by .chezmoiignore.tmpl. Optional.
#   skip_via           — list of `via` values from packages.yaml to skip entirely
#                        on this system (e.g. ["cargo", "uv", "go", "mise"] to
#                        avoid running language toolchain installers). Optional.
#   default_check      — fallback `check` value used when a `via: pkg` package
#                        doesn't specify its own check. "rpm" on rpm-based
#                        distros, "which" elsewhere. Optional, defaults to "rpm".
#
# To support a new distro, add a new [systems.<name>] table.

[systems.opensuse]
ids = ["opensuse-tumbleweed", "opensuse-leap", "opensuse"]
install = ["sudo", "zypper", "install"]

[systems.fedora]
ids = ["fedora", "fedora-asahi-remix"]
install = ["sudo", "dnf", "install", "-y", "--skip-unavailable", "--skip-broken"]

[systems.macos]
ids = ["darwin"]
install = ["brew", "install"]
exclude_by_default = true
skip_via = ["mise", "go"]
default_check = "which"

